<!DOCTYPE html>
<html class="text_align_center">
<meta charset="utf-8" />

<head>
  <title>Fox In Space</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body onload="onLoad();">
  <table>
    <tr>
      <td colspan="3">
        <svg width="600" height="400" viewBox="0 0 600 400" stroke="black" stroke-width="2" class="bg_black" xmlns="http://www.w3.org/2000/svg">
          <image id="planet" href="openmoji/ringed-planet.svg" x="250" y="150" width="100" height="100"></image>
          <image id="rock1" href="openmoji/rock.svg" x="100" y="200" width="100" height="100"></image>
          <image id="rock2" href="openmoji/rock.svg" x="200" y="200" width="100" height="100"></image>
          <image id="rock3" href="openmoji/rock.svg" x="300" y="200" width="100" height="100"></image>
          <image id="rock4" href="openmoji/rock.svg" x="400" y="200" width="100" height="100"></image>
          <image id="fox" href="openmoji/fox.svg" x="250" y="300" width="100" height="100"></image>
        </svg>
      </td>
    </tr>
    <tr>
      <td><button onclick="moveLeft()">Left(A)</button></td>
      <td><button onclick="attack()">Attack(D)</button></td>
      <td><button onclick="moveRight()">Right(D)</button></td>
    </tr>
  </table>
  <script>
    let distance;
    let heading;

    const onLoad = () => {
      distance = 25;
      heading = 0;
      updateGame();
      document.addEventListener('keyup', keyUp, false);
    };

    const keyUp = (e) => {
      if (e.keyCode == 65) {
        moveLeft();
      }
      if (e.keyCode == 83) {
        attack();
      }
      if (e.keyCode == 68) {
        moveRight();
      }
    };

    const updatePlanet = () => {
      const planetElt = document.querySelector('#planet');
      // start at 25=100
      // end at 0=400
      const size = 400 - (distance * 12);
      planetElt.setAttribute('x', 300 - (size / 2));
      planetElt.setAttribute('y', 200 - (size / 2));
      planetElt.setAttribute('width', size);
      planetElt.setAttribute('height', size);
      // console.log('updatePlanet', distance, size, planetElt);
    }

    const updateFox = () => {
      const foxElt = document.querySelector('#fox');
      const x = (heading + 5) * 50;
      foxElt.setAttribute('x', x);
      console.log('updateFox', heading, x, foxElt);
    }

    const updateGame = () => {
      distance = Math.max(0, distance);
      if (heading < -5) {
        heading = -5;
      }
      if (heading > +5) {
        heading = +5;
      }
      // heading = Math.max(-2, heading);
      // heading = Math.max(+2, heading);
      updatePlanet();
      updateFox();
    };

    const moveLeft = () => {
      heading--;
      distance--;
      updateGame();
    };

    const attack = () => {
      distance--;
      updateGame();
    };

    const moveRight = () => {
      heading++;
      distance--;
      updateGame();
    };
  </script>
</body>

</html>
